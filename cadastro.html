<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Cadastro interno de pesquisadores para o portal tematico da Fundacao SCP."><title>Cadastro de Pesquisador | SCP Archive</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head>
<body class="page-form"><main class="form-page"><section class="panel form-shell"><a class="back-link" href="index.html">Voltar ao arquivo</a><p class="label">Cadastro interno</p><h1>Registro de pesquisador</h1><p>Preencha os campos para gerar um pedido ficticio de credenciamento no arquivo.</p><form id="scp-form" novalidate><label for="nome">Nome completo</label><input id="nome" name="nome" type="text" placeholder="Digite seu nome"><small data-error-for="nome"></small><label for="email">Email institucional</label><input id="email" name="email" type="email" placeholder="pesquisador@scp.org"><small data-error-for="email"></small><label for="setor">Setor de interesse</label><select id="setor" name="setor"><option value="">Selecione</option><option>Pesquisa</option><option>Seguranca</option><option>Documentacao</option><option>Logistica</option></select><small data-error-for="setor"></small><label for="mensagem">Justificativa</label><textarea id="mensagem" name="mensagem" rows="5" placeholder="Explique sua solicitacao"></textarea><small data-error-for="mensagem"></small><button class="button button--primary" type="submit">Enviar registro</button><p class="form-status" id="form-status"></p></form></section></main><script src="script.js"></script></body></html>
